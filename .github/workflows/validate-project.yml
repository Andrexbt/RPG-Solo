name: Validar projeto

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verificar sintaxe JavaScript
        shell: bash
        run: |
          while IFS= read -r -d '' arquivo; do
            node --check "$arquivo"
          done < <(find . -type f -name "*.js" -not -path "./.git/*" -print0)

      - name: Validar HTML
        run: npx --yes html-validate@10.4.0 "*.html" "prototipos/**/*.html"
