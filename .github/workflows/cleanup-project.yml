name: Limpeza segura do projeto

on:
  push:
    paths:
      - "scripts/cleanup_project.py"
      - "scripts/move_ficha_css.py"
      - ".github/workflows/cleanup-project.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Mover estilos da ficha
        run: python scripts/move_ficha_css.py

      - name: Executar limpeza estrutural
        run: python scripts/cleanup_project.py

      - name: Padronizar indentação
        run: npx --yes prettier@3.3.3 --write "**/*.{html,css,js}"

      - name: Salvar alterações
        run: |
          if git diff --quiet; then
            echo "Nenhuma alteração necessária."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Move estilos da ficha para o componente"
          git push
