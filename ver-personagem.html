<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Personagem</title>
    <link rel="stylesheet" href="tema.css">
    <link rel="stylesheet" href="ficha-personagem.css">
    <link rel="stylesheet" href="ver-personagem.css">
  </head>

  <body>
    <!-- =====================================================
         Cabeçalho da página
         ===================================================== -->
    <header class="cabecalho-site">
      <a class="marca" href="index.html">
        <span class="marca-simbolo">✦</span>
        <span>Projeto RPG Solo</span>
      </a>

      <nav class="menu-principal">
        <a href="index.html">Início</a>
        <a href="criacao-personagem.html">Criar personagem</a>
        <a href="meus-personagens.html">Meus personagens</a>
      </nav>
    </header>

    <main class="pagina-ver-personagem">
      <!-- =====================================================
           Ações da ficha salva
           ===================================================== -->
      <section class="hero-ver-personagem">
        <div class="decoracao-fundo decoracao-um"></div>
        <div class="decoracao-fundo decoracao-dois"></div>
        <div class="ornamento-rpg ornamento-ficha"></div>

        <div class="conteudo-hero-ver">
          <p class="etiqueta-pagina">Ficha salva</p>

          <h1>Ficha do personagem</h1>

          <p>
            Consulte os dados completos do personagem, revise atributos,
            habilidades, ataques, equipamentos e magias preparadas.
          </p>

          <div class="acoes-ficha-salva">
            <a class="botao botao-secundario" href="meus-personagens.html">
              Voltar para meus personagens
            </a>

            <button class="botao botao-principal" id="botaoBaixarPdfEditavel">
              Baixar PDF editável
            </button>
          </div>
        </div>
      </section>

      <!-- =====================================================
           Ficha do personagem carregado do localStorage
           -----------------------------------------------------
           Os valores são preenchidos por ver-personagem.js e
           pelas funções compartilhadas de ficha-personagem.js.
           ===================================================== -->
      <section class="layout-ficha-salva">
        <aside
          class="ficha-personagem-salva"
          data-ficha-personagem
        ></aside>
      </section>
    </main>

    <!-- =====================================================
         Modal compartilhada de detalhes da ficha
         ===================================================== -->
    <div id="modalDetalheFicha" class="modal-detalhe-ficha escondida">
      <div class="modal-detalhe-conteudo">
        <button
          type="button"
          id="botaoFecharModalDetalheFicha"
          class="botao-fechar-detalhe"
        >
          Fechar
        </button>

        <h2 id="modalDetalheTitulo"></h2>
        <p id="modalDetalheDescricao"></p>
        <div id="modalDetalheMecanica" class="modal-detalhe-mecanica"></div>
      </div>
    </div>

    <!-- =====================================================
         Scripts
         -----------------------------------------------------
         A ordem importa: bancos primeiro e módulos compartilhados
         depois. ficha-personagem.js carrega ver-personagem.js.
         ===================================================== -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <script src="banco-pericias.js"></script>
    <script src="banco-idiomas.js"></script>
    <script src="banco-talentos.js"></script>
    <script src="banco-antecedentes.js"></script>
    <script src="banco-classes.js"></script>
    <script src="banco-equipamentos.js"></script>
    <script src="banco-maestrias.js"></script>
    <script src="banco-propriedades-armas.js"></script>
    <script src="banco-habilidades.js"></script>
    <script src="banco-magias.js"></script>
    <script src="banco-especies.js"></script>
    <script src="detalhes-ficha.js"></script>
    <script src="ficha-personagem.js"></script>
    <script src="transicoes-paginas.js"></script>
  </body>
</html>
